<svg xmlns="http://www.w3.org/2000/svg" width="920" height="250" viewBox="0 0 920 250" role="img" aria-labelledby="title desc">
  <title id="title">SLAPR ANSI Shadow logo</title>
  <desc id="desc">A red SLAPR wordmark inspired by ANSI Shadow ASCII lettering.</desc>
  <rect width="920" height="250" rx="18" fill="#08090B"/>
  <text x="34" y="42" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">ANSI Shadow</text>

  <defs>
    <g id="slapr-cells">
      <!-- S -->
      <rect x="0" y="0" width="18" height="18"/><rect x="22" y="0" width="18" height="18"/><rect x="44" y="0" width="18" height="18"/><rect x="66" y="0" width="18" height="18"/><rect x="88" y="0" width="18" height="18"/>
      <rect x="0" y="22" width="18" height="18"/>
      <rect x="0" y="44" width="18" height="18"/><rect x="22" y="44" width="18" height="18"/><rect x="44" y="44" width="18" height="18"/><rect x="66" y="44" width="18" height="18"/>
      <rect x="88" y="66" width="18" height="18"/>
      <rect x="22" y="88" width="18" height="18"/><rect x="44" y="88" width="18" height="18"/><rect x="66" y="88" width="18" height="18"/><rect x="88" y="88" width="18" height="18"/>
      <rect x="88" y="110" width="18" height="18"/>
      <rect x="0" y="132" width="18" height="18"/><rect x="22" y="132" width="18" height="18"/><rect x="44" y="132" width="18" height="18"/><rect x="66" y="132" width="18" height="18"/><rect x="88" y="132" width="18" height="18"/>

      <!-- L -->
      <rect x="130" y="0" width="18" height="18"/><rect x="130" y="22" width="18" height="18"/><rect x="130" y="44" width="18" height="18"/><rect x="130" y="66" width="18" height="18"/><rect x="130" y="88" width="18" height="18"/><rect x="130" y="110" width="18" height="18"/>
      <rect x="130" y="132" width="18" height="18"/><rect x="152" y="132" width="18" height="18"/><rect x="174" y="132" width="18" height="18"/><rect x="196" y="132" width="18" height="18"/><rect x="218" y="132" width="18" height="18"/>

      <!-- A -->
      <rect x="260" y="22" width="18" height="18"/><rect x="282" y="0" width="18" height="18"/><rect x="304" y="0" width="18" height="18"/><rect x="326" y="0" width="18" height="18"/><rect x="348" y="22" width="18" height="18"/>
      <rect x="260" y="44" width="18" height="18"/><rect x="348" y="44" width="18" height="18"/>
      <rect x="260" y="66" width="18" height="18"/><rect x="282" y="66" width="18" height="18"/><rect x="304" y="66" width="18" height="18"/><rect x="326" y="66" width="18" height="18"/><rect x="348" y="66" width="18" height="18"/>
      <rect x="260" y="88" width="18" height="18"/><rect x="348" y="88" width="18" height="18"/><rect x="260" y="110" width="18" height="18"/><rect x="348" y="110" width="18" height="18"/><rect x="260" y="132" width="18" height="18"/><rect x="348" y="132" width="18" height="18"/>

      <!-- P -->
      <rect x="390" y="0" width="18" height="18"/><rect x="412" y="0" width="18" height="18"/><rect x="434" y="0" width="18" height="18"/><rect x="456" y="0" width="18" height="18"/>
      <rect x="390" y="22" width="18" height="18"/><rect x="478" y="22" width="18" height="18"/>
      <rect x="390" y="44" width="18" height="18"/><rect x="478" y="44" width="18" height="18"/>
      <rect x="390" y="66" width="18" height="18"/><rect x="412" y="66" width="18" height="18"/><rect x="434" y="66" width="18" height="18"/><rect x="456" y="66" width="18" height="18"/>
      <rect x="390" y="88" width="18" height="18"/><rect x="390" y="110" width="18" height="18"/><rect x="390" y="132" width="18" height="18"/>

      <!-- R -->
      <rect x="520" y="0" width="18" height="18"/><rect x="542" y="0" width="18" height="18"/><rect x="564" y="0" width="18" height="18"/><rect x="586" y="0" width="18" height="18"/>
      <rect x="520" y="22" width="18" height="18"/><rect x="608" y="22" width="18" height="18"/>
      <rect x="520" y="44" width="18" height="18"/><rect x="608" y="44" width="18" height="18"/>
      <rect x="520" y="66" width="18" height="18"/><rect x="542" y="66" width="18" height="18"/><rect x="564" y="66" width="18" height="18"/><rect x="586" y="66" width="18" height="18"/>
      <rect x="520" y="88" width="18" height="18"/><rect x="564" y="88" width="18" height="18"/>
      <rect x="520" y="110" width="18" height="18"/><rect x="586" y="110" width="18" height="18"/>
      <rect x="520" y="132" width="18" height="18"/><rect x="608" y="132" width="18" height="18"/>
    </g>
  </defs>

  <g transform="translate(158 66)">
    <use href="#slapr-cells" fill="none" stroke="#5F0A0F" stroke-width="16" transform="translate(10 10)"/>
    <use href="#slapr-cells" fill="none" stroke="#FF5A5A" stroke-width="4" transform="translate(5 5)" opacity="0.75"/>
    <use href="#slapr-cells" fill="#FF2D2D"/>
  </g>
</svg>
