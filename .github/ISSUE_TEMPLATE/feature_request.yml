name: Feature Request
description: Suggest a new model, template, workflow, or UI improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature or improvement.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Related examples, models, templates, or constraints.
